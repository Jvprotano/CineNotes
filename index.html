    <!-- ===== Login ===== -->
    <div id="login-screen" class="login-screen">
      <div class="login-backdrop" aria-hidden="true"></div>
      <div class="login-card">
        <button id="btn-lang-login" class="login-lang" type="button">EN</button>
        <img src="assets/logo.png" alt="CineNotes" class="login-logo" />
        <h1 class="login-wordmark">CineNotes</h1>
        <p class="login-tagline" data-i18n="loginTagline">O diário de cinema de vocês dois</p>
        <p class="login-subtitle" data-i18n="loginSubtitle"></p>

        <div class="login-tabs" role="tablist">
          <button class="login-tab active" data-ltab="enter" data-i18n="tabEnter" type="button">Entrar</button>
          <button class="login-tab" data-ltab="create" data-i18n="tabCreate" type="button">Criar sala</button>
        </div>

        <form id="form-enter" class="login-form">
          <div class="field">
            <label for="enter-code" data-i18n="labelRoomCode">Código da sala</label>
            <input type="text" id="enter-code" data-i18n-placeholder="placeholderCode" autocomplete="username" autocapitalize="none" spellcheck="false" required />
          </div>
          <div class="field">
            <label for="enter-pass" data-i18n="labelPassword">Senha</label>
            <input type="password" id="enter-pass" autocomplete="current-password" required />
          </div>
          <button type="submit" class="btn btn-primary btn-block" data-i18n="btnEnter">Entrar</button>
        </form>

        <form id="form-create" class="login-form" style="display:none">
          <div class="field">
            <label for="create-code" data-i18n="labelChooseCode">Escolham um código</label>
            <input type="text" id="create-code" data-i18n-placeholder="placeholderCode" autocapitalize="none" spellcheck="false" minlength="3" maxlength="30" required />
            <span class="field-hint" data-i18n="hintCode"></span>
          </div>
          <div class="field">
            <label for="create-pass" data-i18n="labelSetPassword">Definam uma senha</label>
            <input type="password" id="create-pass" autocomplete="new-password" minlength="4" required />
            <span class="field-hint" data-i18n="hintPassword"></span>
          </div>
          <button type="submit" class="btn btn-primary btn-block" data-i18n="btnCreateRoom">Criar sala</button>
        </form>

        <div id="login-message" class="login-message" style="display:none"></div>

        <div class="login-chips" aria-hidden="true">
          <span data-i18n="loginChip1"></span>
          <span data-i18n="loginChip2"></span>
          <span data-i18n="loginChip3"></span>
        </div>
      </div>
    </div>

    <!-- ===== App shell ===== -->
    <div id="app" style="display:none">
      <header class="topbar">
        <div class="topbar-inner">
          <div class="brand">
            <img src="assets/logo.png" alt="" class="brand-logo" />
            <span class="brand-name">CineNotes</span>
          </div>
          <div class="topbar-actions">
            <span id="sync-dot" class="sync-dot" title=""></span>
            <button id="btn-settings" class="icon-btn" type="button" data-i18n-aria="settingsTitle">
              <svg class="icon"><use href="#i-settings"/></svg>
            </button>
          </div>
        </div>
      </header>

      <main id="main">
        <!-- Home -->
        <section id="view-home" class="view">
          <div class="home-greeting">
            <h1 id="greeting-text"></h1>
            <p data-i18n="homeSubtitle"></p>
          </div>
          <div id="pending-banner"></div>
          <div id="tonight-container"></div>
          <div id="home-rows"></div>
          <div id="home-empty"></div>
        </section>

        <!-- Library -->
        <section id="view-library" class="view" style="display:none">
          <div class="view-header">
            <h1 data-i18n="libraryTitle">Filmes</h1>
            <span class="view-count" id="library-count"></span>
          </div>
          <div class="library-toolbar">
            <div class="search-field">
              <svg class="icon"><use href="#i-search"/></svg>
              <input type="search" id="library-search" data-i18n-placeholder="searchLibrary" autocomplete="off" />
            </div>
            <div class="segmented" id="library-seg" role="tablist">
              <button class="seg active" data-seg="couple" type="button"><svg class="icon"><use href="#i-users"/></svg><span data-i18n="segCouple"></span></button>
              <button class="seg" data-seg="his" type="button"><svg class="icon"><use href="#i-user"/></svg><span data-i18n="segHis"></span></button>
              <button class="seg" data-seg="hers" type="button"><svg class="icon"><use href="#i-heart"/></svg><span data-i18n="segHers"></span></button>
              <button class="seg" data-seg="recent" type="button"><svg class="icon"><use href="#i-clock"/></svg><span data-i18n="segRecent"></span></button>
            </div>
          </div>
          <div id="library-grid" class="poster-grid"></div>
          <div id="library-empty"></div>
        </section>

        <!-- Watchlist -->
        <section id="view-watchlist" class="view" style="display:none">
          <div class="view-header">
            <h1 data-i18n="watchlistTitle">Watchlist</h1>
            <span class="view-count" id="watchlist-count"></span>
          </div>
          <p class="view-subtitle" data-i18n="watchlistSubtitle"></p>
          <div id="watchlist-grid" class="poster-grid"></div>
          <div id="watchlist-empty"></div>
        </section>

        <!-- Stats -->
        <section id="view-stats" class="view" style="display:none">
          <div class="view-header">
            <h1 data-i18n="statsTitle">Resumo</h1>
          </div>
          <div id="stats-body"></div>
        </section>
      </main>

      <!-- Bottom navigation -->
      <nav class="bottom-nav" aria-label="Main">
        <button class="nav-item active" data-view="home" type="button">
          <svg class="icon"><use href="#i-home"/></svg>
          <span data-i18n="navHome"></span>
        </button>
        <button class="nav-item" data-view="library" type="button">
          <svg class="icon"><use href="#i-film"/></svg>
          <span data-i18n="navLibrary"></span>
        </button>
        <button class="nav-add" id="btn-add" type="button" data-i18n-aria="navAdd">
          <svg class="icon"><use href="#i-plus"/></svg>
        </button>
        <button class="nav-item" data-view="watchlist" type="button">
          <svg class="icon"><use href="#i-bookmark"/></svg>
          <span data-i18n="navWatchlist"></span>
        </button>
        <button class="nav-item" data-view="stats" type="button">
          <svg class="icon"><use href="#i-chart"/></svg>
          <span data-i18n="navStats"></span>
        </button>
      </nav>
    </div>

    <!-- ===== Sheets ===== -->
    <div class="sheet-overlay" id="sheet-add" style="display:none">
      <div class="sheet sheet-tall" role="dialog" aria-modal="true">
        <div class="sheet-handle"></div>
        <div class="sheet-header">
          <h2 data-i18n="addTitle">Adicionar filme</h2>
          <button class="icon-btn sheet-close" data-close="sheet-add" type="button"><svg class="icon"><use href="#i-x"/></svg></button>
        </div>
        <div class="sheet-body">
          <div class="search-field search-field-lg">
            <svg class="icon"><use href="#i-search"/></svg>
            <input type="search" id="add-search" data-i18n-placeholder="addSearchPlaceholder" autocomplete="off" />
          </div>
          <div id="add-results" class="add-results"></div>
        </div>
      </div>
    </div>

    <div class="sheet-overlay" id="sheet-rate" style="display:none">
      <div class="sheet" role="dialog" aria-modal="true">
        <div class="sheet-handle"></div>
        <div class="sheet-header">
          <h2 data-i18n="rateTitle">Como foi?</h2>
          <button class="icon-btn sheet-close" data-close="sheet-rate" type="button"><svg class="icon"><use href="#i-x"/></svg></button>
        </div>
        <div class="sheet-body">
          <div id="rate-movie" class="rate-movie"></div>
          <div class="segmented segmented-full" id="rate-mode">
            <button class="seg active" data-mode="joint" type="button"><svg class="icon"><use href="#i-users"/></svg><span data-i18n="rateModeJoint"></span></button>
            <button class="seg" data-mode="individual" type="button"><svg class="icon"><use href="#i-user"/></svg><span data-i18n="rateModeIndividual"></span></button>
          </div>
          <div id="rate-joint" class="rate-sliders">
            <div class="rate-slider" data-color="joint">
              <div class="rate-slider-head">
                <label for="slider-joint" data-i18n="coupleRating"></label>
                <span class="rate-value" id="slider-joint-val">7.0</span>
              </div>
              <input type="range" id="slider-joint" min="0" max="10" step="0.5" value="7" />
            </div>
          </div>
          <div id="rate-individual" class="rate-sliders" style="display:none">
            <div class="rate-slider" data-color="him">
              <div class="rate-slider-head">
                <label for="slider-him" data-i18n="hisRating"></label>
                <span class="rate-value" id="slider-him-val">7.0</span>
              </div>
              <input type="range" id="slider-him" min="0" max="10" step="0.5" value="7" />
            </div>
            <div class="rate-slider" data-color="her">
              <div class="rate-slider-head">
                <label for="slider-her" data-i18n="herRating"></label>
                <span class="rate-value" id="slider-her-val">7.0</span>
              </div>
              <input type="range" id="slider-her" min="0" max="10" step="0.5" value="7" />
            </div>
          </div>
          <div class="sheet-actions">
            <button class="btn btn-primary btn-block" id="btn-rate-save" type="button" data-i18n="saveRating"></button>
            <button class="btn btn-ghost btn-block" id="btn-rate-later" type="button" data-i18n="rateLater"></button>
          </div>
        </div>
      </div>
    </div>

    <div class="sheet-overlay" id="sheet-detail" style="display:none">
      <div class="sheet sheet-tall sheet-detail" role="dialog" aria-modal="true">
        <button class="icon-btn sheet-close sheet-close-float" data-close="sheet-detail" type="button"><svg class="icon"><use href="#i-x"/></svg></button>
        <div class="sheet-body sheet-body-flush" id="detail-body"></div>
      </div>
    </div>

    <div class="sheet-overlay" id="sheet-edit" style="display:none">
      <div class="sheet" role="dialog" aria-modal="true">
        <div class="sheet-handle"></div>
        <div class="sheet-header">
          <h2 data-i18n="editDetails">Editar detalhes</h2>
          <button class="icon-btn sheet-close" data-close="sheet-edit" type="button"><svg class="icon"><use href="#i-x"/></svg></button>
        </div>
        <div class="sheet-body">
          <form id="form-edit">
            <div class="field-row">
              <div class="field field-grow">
                <label for="edit-title" data-i18n="labelTitle"></label>
                <input type="text" id="edit-title" required />
              </div>
              <div class="field field-sm">
                <label for="edit-year" data-i18n="labelYear"></label>
                <input type="number" id="edit-year" min="1900" max="2100" />
              </div>
            </div>
            <div class="field">
              <label for="edit-genre" data-i18n="labelGenre"></label>
              <input type="text" id="edit-genre" />
            </div>
            <div class="field">
              <label for="edit-poster" data-i18n="labelPoster"></label>
              <input type="url" id="edit-poster" />
            </div>
            <div class="sheet-actions">
              <button type="submit" class="btn btn-primary btn-block" data-i18n="save"></button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div class="sheet-overlay" id="sheet-settings" style="display:none">
      <div class="sheet" role="dialog" aria-modal="true">
        <div class="sheet-handle"></div>
        <div class="sheet-header">
          <h2 data-i18n="settingsTitle">Ajustes</h2>
          <button class="icon-btn sheet-close" data-close="sheet-settings" type="button"><svg class="icon"><use href="#i-x"/></svg></button>
        </div>
        <div class="sheet-body">
          <div class="settings-row">
            <div class="settings-label">
              <svg class="icon"><use href="#i-users"/></svg>
              <span data-i18n="roomLabel"></span>
            </div>
            <span class="settings-value" id="settings-room"></span>
          </div>
          <div class="settings-row">
            <div class="settings-label">
              <svg class="icon"><use href="#i-globe"/></svg>
              <span data-i18n="languageLabel"></span>
            </div>
            <div class="segmented segmented-sm" id="lang-seg">
              <button class="seg" data-lang="pt-BR" type="button">PT</button>
              <button class="seg" data-lang="en" type="button">EN</button>
            </div>
          </div>
          <button class="btn btn-danger-ghost btn-block" id="btn-logout" type="button">
            <svg class="icon"><use href="#i-logout"/></svg>
            <span data-i18n="logout"></span>
          </button>
          <p class="settings-about" data-i18n="settingsAbout"></p>
        </div>
      </div>
    </div>

    <div class="sheet-overlay" id="sheet-confirm" style="display:none">
      <div class="sheet sheet-confirm" role="alertdialog" aria-modal="true">
        <div class="sheet-handle"></div>
        <div class="sheet-body">
          <p id="confirm-message" class="confirm-message"></p>
          <div class="confirm-actions">
            <button class="btn btn-ghost" id="btn-confirm-cancel" type="button" data-i18n="cancel"></button>
            <button class="btn btn-danger" id="btn-confirm-ok" type="button" data-i18n="remove"></button>
          </div>
        </div>
      </div>
    </div>

    <div id="toast-container"></div>

    <script src="app.js"></script>
  </body>
</html>
